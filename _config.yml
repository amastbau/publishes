title: "Amos Mastbaum — Publishes"
description: "Articles on software engineering, AI, and infrastructure"
url: "https://amastbau.github.io"
baseurl: "/publishes"

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

permalink: /:categories/:title/

author:
  name: "Amos Mastbaum"
  bio: "Senior Engineer @ Red Hat"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/amastbau"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      share: true
      pagination: false
  - scope:
      path: ""
    values:
      layout: single

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
